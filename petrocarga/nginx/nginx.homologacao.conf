events {}

http {
    map_hash_bucket_size 128;

    # LOGS
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    client_max_body_size 10M;
    server_tokens off;

    # RATE LIMIT
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # CONEXÕES
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # CORS - somente origins permitidas
    map $http_origin $cors_origin {
        default "";
        "http://localhost:3000" $http_origin;
        "https://controle-de-vagas-front.vercel.app" $http_origin;
        "https://controle-de-vagas-front-git-luismiguel-dmobcptrans-projects.vercel.app" $http_origin;
        "https://controle-de-vagas-front-git-joserodrigo-dmobcptrans-projects.vercel.app" $http_origin;
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # HEADERS DE SEGURANÇA
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # CONEXÕES
        limit_conn conn_limit 20;

        # BLOQUEIO DE MÉTODOS
        if ($request_method !~ ^(GET|POST|PATCH|DELETE|OPTIONS)$) {
            return 405;
        }

        # =========================
        # BLOCO PADRÃO DA API
        # =========================
        location /petrocarga/ {

            limit_req zone=global_limit burst=20 nodelay;

            # PRE-FLIGHT
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, ngrok-skip-browser-warning' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Vary' 'Origin' always;
                add_header 'Content-Length' 0 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                return 204;
            }

            proxy_pass http://backend:8080;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_buffering off;
            proxy_cache off;

            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Vary' 'Origin' always;
        }

        # =========================
        # AUTH - rate limit mais rígido
        # =========================
        location /petrocarga/auth/ {

            limit_req zone=auth_limit burst=10 nodelay;

            # PRE-FLIGHT
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, ngrok-skip-browser-warning' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Vary' 'Origin' always;
                add_header 'Content-Length' 0 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                return 204;
            }

            proxy_pass http://backend:8080;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_buffering off;
            proxy_cache off;

            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Vary' 'Origin' always;
        }

        # =========================
        # SSE
        # =========================
        location /petrocarga/notificacoes/stream {

            limit_conn conn_limit 5;

            # PRE-FLIGHT
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
                add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, ngrok-skip-browser-warning' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Vary' 'Origin' always;
                add_header 'Content-Length' 0 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                return 204;
            }

            proxy_pass http://backend:8080;

            proxy_http_version 1.1;
            proxy_set_header Connection keep-alive;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;

            add_header Cache-Control "no-cache" always;
            add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, ngrok-skip-browser-warning' always;
            add_header 'Vary' 'Origin' always;
        }
    }
}