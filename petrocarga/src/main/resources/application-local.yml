spring:
    config:
        activate:
            on-profile: local

    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/petrocarga}
        username: ${SPRING_DATASOURCE_USERNAME:postgres}
        password: ${SPRING_DATASOURCE_PASSWORD:123456}
        driver-class-name: org.postgresql.Driver
        hikari:
            maximum-pool-size: 5
    jpa:
        show-sql: true
    flyway:
        url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/petrocarga}
        user: ${SPRING_DATASOURCE_USERNAME:postgres}
        password: ${SPRING_DATASOURCE_PASSWORD:123456}

app:
    firebase-push-notification:
        enabled: false
        credentials: "classpath:firebase-service-account.json"
    cookie-settings:
        secure: false
        same-site: Lax
    mailSender:
        enabled: false

logging:
    level:
        org:
            hibernate:
                sql: info